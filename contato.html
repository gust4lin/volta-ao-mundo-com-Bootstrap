<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contato - Colômbia</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Poppins', sans-serif;
      background-color: #ffffff;
      color: #222;
    }

    :root {
      --yellow: #FCD116;
      --blue: #003893;
      --red: #CE1126;
      --light: #f5f5f5;
    }

    .navbar {
      background-color: var(--red);
      border-bottom: 4px solid var(--yellow);
    }

    .navbar-brand {
      color: white !important;
      font-weight: 600;
    }

    .nav-link {
      color: white !important;
      font-weight: 500;
      position: relative;
    }

    .nav-link::after {
      content: '';
      position: absolute;
      width: 0;
      height: 2px;
      background: var(--yellow);
      left: 0;
      bottom: -4px;
      transition: 0.3s;
    }

    .nav-link.active::after,
    .nav-link:hover::after {
      width: 100%;
    }

    .hero {
      height: 60vh;
      display: flex;
      align-items: center;
      text-align: center;
      color: white;
      background: linear-gradient(135deg, var(--blue), var(--red));
    }

    .section {
      padding: 70px 0;
    }

    .section-title {
      font-weight: 600;
      color: var(--blue);
    }

    .divider {
      width: 80px;
      height: 4px;
      background: linear-gradient(to right, var(--yellow), var(--red));
      margin: 10px auto 30px;
      border-radius: 10px;
    }

    .form-control {
      border-radius: 10px;
    }

    .btn-custom {
      background-color: var(--yellow);
      border-radius: 25px;
      font-weight: 600;
    }

    .btn-custom:hover {
      background-color: var(--red);
      color: white;
    }

    footer {
      background-color: var(--blue);
      color: white;
      padding: 20px;
      text-align: center;
      font-size: 14px;
    }
  </style>
</head>

<body>

<nav class="navbar navbar-expand-lg">
  <div class="container">
    <a class="navbar-brand" href="index.html">Colômbia</a>

    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menu">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="menu">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link" href="index.html">Início</a></li>
        <li class="nav-item"><a class="nav-link" href="historia.html">História</a></li>
        <li class="nav-item"><a class="nav-link" href="cultura.html">Cultura</a></li>
        <li class="nav-item"><a class="nav-link" href="turismo.html">Turismo</a></li>
        <li class="nav-item"><a class="nav-link" href="curiosidades.html">Curiosidades</a></li>
        <li class="nav-item"><a class="nav-link active" href="contato.html">Contato</a></li>
      </ul>
    </div>
  </div>
</nav>

<section class="hero">
  <div class="container">
    <h1>Entre em Contato</h1>
    <p class="mt-3">Fale conosco ou envie sua mensagem</p>
  </div>
</section>

<section class="section">
  <div class="container">
    <h2 class="text-center section-title">Envie uma mensagem</h2>
    <div class="divider"></div>

    <div class="row justify-content-center">
      <div class="col-md-6">

        <form>
          <div class="mb-3">
            <label class="form-label">Nome</label>
            <input type="text" class="form-control" placeholder="Seu nome">
          </div>

          <div class="mb-3">
            <label class="form-label">Email</label>
            <input type="email" class="form-control" placeholder="Seu email">
          </div>

          <div class="mb-3">
            <label class="form-label">Mensagem</label>
            <textarea class="form-control" rows="4" placeholder="Digite sua mensagem"></textarea>
          </div>

          <button type="submit" class="btn btn-custom w-100">Enviar</button>
        </form>

      </div>
    </div>

  </div>
</section>

<section class="section bg-soft">
  <div class="container text-center">
    <h2 class="section-title">Informações</h2>
    <div class="divider"></div>

    <p>Email: contato@colombia.com</p>
    <p>Telefone: (11) 99999-9999</p>
  </div>
</section>

<footer>
  <p>Colômbia • 2026</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
```
